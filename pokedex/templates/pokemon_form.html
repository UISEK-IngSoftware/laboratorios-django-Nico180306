{% extends 'base.html' %}
{% block title %}
  Formulario de Pokemon
{% endblock %}
{% block content %}
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_div }}
    <button type="submit" class="btn btn-primary">Guardar Pokemon</button>
    <a href="{% url "pokedex:index" %}" class="btn btn-secondary">Volver a la lista</a>
  </form>
{% endblock %}
